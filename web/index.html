<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="theme-override.css">
</head>
<body>
  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <h1 class="mobile-title">Prompt Library</h1>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-row">
          <h1 class="logo">Prompt Library</h1>
          <button class="new-prompt-btn" id="new-prompt-btn" title="새 프롬프트">+ 새 프롬프트</button>
        </div>
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search prompts... (Cmd+K)">
          <kbd class="search-kbd">&#8984;K</kbd>
        </div>
      </div>

      <div class="tag-filter" id="tag-filter">
        <div class="tag-autocomplete-wrapper">
          <input type="text" id="tag-input" class="tag-input" placeholder="태그 검색..." autocomplete="off">
          <div class="tag-dropdown" id="tag-dropdown"></div>
        </div>
        <div class="tag-chips" id="tag-chips"></div>
      </div>

      <nav class="categories" id="categories"></nav>

      <div class="type-filter" id="type-filter">
        <div class="type-buttons">
          <button class="type-toggle active" data-type="all">All</button>
          <button class="type-toggle" data-type="prompt">Prompt</button>
          <button class="type-toggle" data-type="concept">Concept</button>
          <button class="type-toggle" data-type="guide">Guide</button>
        </div>
      </div>

      <div class="prompt-list-wrapper">
        <div class="match-count" id="match-count"></div>
        <ul class="prompt-list" id="prompt-list"></ul>
        <div class="empty-state" id="empty-state" hidden>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>No prompts found</p>
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main viewer -->
    <main class="viewer" id="viewer">
      <div class="viewer-header" id="viewer-header">
        <div class="viewer-meta">
          <h2 class="viewer-title" id="viewer-title">Select a prompt</h2>
          <div class="viewer-tags" id="viewer-tags"></div>
        </div>
        <div class="viewer-actions">
          <button class="action-btn" id="edit-btn" title="편집" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <span>편집</span>
          </button>
          <button class="action-btn action-btn-danger" id="delete-btn" title="삭제" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
            <span>삭제</span>
          </button>
          <button class="action-btn" id="history-btn" title="히스토리" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <span>히스토리</span>
          </button>
          <button class="action-btn" id="suggest-btn" title="AI 개선" style="display:none">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
            <span>AI 개선</span>
          </button>
          <button class="copy-btn" id="copy-btn" title="Copy raw markdown">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            <span>Copy</span>
          </button>
          <button class="copy-btn copy-md-btn" id="copy-md-btn" title="Copy as .md file (frontmatter 포함)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span>.md</span>
          </button>
        </div>
      </div>
      <div class="placeholder-form" id="placeholder-form" style="display:none"></div>
      <article class="viewer-content" id="viewer-content">
        <div class="welcome-message">
          <h2>Welcome to Prompt Library</h2>
          <p>Select a prompt from the sidebar to view its content.</p>
          <p class="shortcut-hint">Press <kbd>Cmd+K</kbd> to search</p>
        </div>
      </article>
    </main>

    <!-- Edit Panel -->
    <div class="edit-panel" id="edit-panel">
      <div class="edit-panel-header">
        <h2 id="edit-panel-title">새 프롬프트</h2>
        <button class="edit-panel-close" id="edit-cancel-btn">&times;</button>
      </div>
      <form id="edit-form" class="edit-form">
        <div class="form-group">
          <label for="edit-title">제목</label>
          <input type="text" id="edit-title" required placeholder="프롬프트 제목">
        </div>
        <div class="form-group">
          <label for="edit-category">카테고리</label>
          <select id="edit-category" required>
            <option value="rca">RCA</option>
            <option value="incident-response">인시던트</option>
            <option value="application">애플리케이션</option>
            <option value="infrastructure">인프라</option>
            <option value="security">보안</option>
            <option value="data-ai">데이터/AI</option>
            <option value="shared">공용</option>
            <option value="techniques">기법</option>
            <option value="coding">코딩</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-tags">태그 (쉼표 구분)</label>
          <input type="text" id="edit-tags" placeholder="kubernetes, pod, rca">
        </div>
        <div class="form-group">
          <label for="edit-role">역할</label>
          <input type="text" id="edit-role" placeholder="SRE, DevOps 등">
        </div>
        <div class="form-group form-group-grow">
          <label for="edit-content">내용 (Markdown)</label>
          <div class="editor-container" id="editor-container">
            <textarea id="edit-content" required placeholder="마크다운 내용을 입력하세요..."></textarea>
          </div>
        </div>
        <div class="form-group">
          <label for="edit-change-summary">변경 요약</label>
          <input type="text" id="edit-change-summary" placeholder="변경 사항을 간단히 설명하세요">
        </div>
        <div class="form-actions">
          <button type="button" class="btn-secondary" id="edit-cancel-btn-footer">취소</button>
          <button type="submit" class="btn-primary">저장</button>
        </div>
      </form>
    </div>

    <!-- Version History Panel -->
    <div class="version-panel" id="version-panel">
      <div class="version-panel-header">
        <h3>버전 히스토리</h3>
        <button class="version-panel-close" id="version-close-btn">&times;</button>
      </div>
      <div class="version-list" id="version-list"></div>
    </div>

    <!-- AI Suggestion Panel -->
    <div class="suggestion-panel" id="suggestion-panel">
      <div class="suggestion-panel-header">
        <h3>AI 개선 제안</h3>
        <button class="suggestion-panel-close" id="suggestion-close-btn">&times;</button>
      </div>
      <div class="suggestion-loading" id="suggestion-loading" style="display:none">
        <div class="spinner"></div>
        <p>AI가 분석 중...</p>
      </div>
      <div class="suggestion-content" id="suggestion-content"></div>
      <div class="suggestion-actions" id="suggestion-actions" style="display:none">
        <button class="btn-secondary" id="suggestion-reject-btn">거부</button>
        <button class="btn-primary" id="suggestion-accept-btn">수락</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/placeholder.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/5.2.0/diff.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  <script src="editor.js"></script>
  <script src="diff-helpers.js"></script>
  <script src="versions.js"></script>
  <script src="suggestions.js"></script>
  <script src="app.js?v=2"></script>
</body>
</html>
