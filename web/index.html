<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="sidebar-toggle" aria-label="Toggle sidebar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <h1 class="mobile-title">Prompt Library</h1>
  </header>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Prompt Library</h1>
        <div class="search-wrapper">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search prompts... (Cmd+K)">
          <kbd class="search-kbd">&#8984;K</kbd>
        </div>
      </div>

      <div class="tag-filter" id="tag-filter">
        <select id="tag-select" class="tag-select">
          <option value="">Filter by tag...</option>
        </select>
        <div class="tag-chips" id="tag-chips"></div>
      </div>

      <nav class="categories" id="categories"></nav>

      <div class="prompt-list-wrapper">
        <div class="match-count" id="match-count"></div>
        <ul class="prompt-list" id="prompt-list"></ul>
        <div class="empty-state" id="empty-state" hidden>
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <p>No prompts found</p>
        </div>
      </div>
    </aside>

    <!-- Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main viewer -->
    <main class="viewer" id="viewer">
      <div class="viewer-header" id="viewer-header">
        <div class="viewer-meta">
          <h2 class="viewer-title" id="viewer-title">Select a prompt</h2>
          <div class="viewer-tags" id="viewer-tags"></div>
        </div>
        <button class="copy-btn" id="copy-btn" title="Copy raw markdown">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          <span>Copy</span>
        </button>
      </div>
      <article class="viewer-content" id="viewer-content">
        <div class="welcome-message">
          <h2>Welcome to Prompt Library</h2>
          <p>Select a prompt from the sidebar to view its content.</p>
          <p class="shortcut-hint">Press <kbd>Cmd+K</kbd> to search</p>
        </div>
      </article>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
